# Lumina BFF 反代片段
# 把这一段插入到 /etc/nginx/sites-enabled/default 中
# server { listen 443 ssl; server_name cuizhexiao.xyz ...; ... } 块的内部，
# 紧挨着现有的 location ^~ /api/ 那一块即可。
#
# 然后：nginx -t && systemctl reload nginx

location ^~ /lumina-api/ {
    proxy_pass http://127.0.0.1:3030/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_buffering off;
    add_header X-Service "lumina-bff" always;
}
